name: Auto-merge PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge
        run: gh pr merge "${{ github.event.pull_request.number }}" --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
